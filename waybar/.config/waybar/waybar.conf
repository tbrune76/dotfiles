{
    "layer": "top", // Waybar at top layer
    // "position": "bottom", // Waybar position (top|bottom|left|right)
    //"height": 30, // Waybar height (to be removed for auto height)
    // "width": 1280, // Waybar width
    "spacing": 4, // Gaps between modules (4px)
    // Choose the order of the modules
    //"modules-left": ["hyprland/workspaces", "sway/mode", "sway/scratchpad"],
    "modules-left": ["hyprland/workspaces", "hyprland/submap", "custom/checkkernel"],
    "modules-center": ["hyprland/window"],
    //"modules-right": ["mpd", "idle_inhibitor", "pulseaudio", "network", "cpu", "memory", "temperature", "backlight", "keyboard-state", "sway/language", "battery", "battery#bat2", "clock", "tray"],
    "modules-right": ["user", "tray", "idle_inhibitor","custom/checkupdates", "wireplumber", "network", "cpu", "memory", "temperature", "clock"],


    "hyprland/workspaces": {
      //"format": "{name}: {icon}",
      "format": "{name}",
      "on-click": "activate",
      "format-icons": {
        "1": "’äĀ",
        "2": "’ē©",
        "3": "’äĪ",
        "4": "’å╝",
        "5": "’üĄ",
        "urgent": "’ü¬",
        //  "active": "’åÆ",
        // "default": "’äæ"
      },
      "persistent-workspaces":{
        "*": 9, // 9 workspaces by default on every monitor
      },
      "sort-by-number": true,
    },
    "hyprland/submap": {
      "format": "Ō£ī’ĖÅ {}",
      "max-length": 8,
      "tooltip": false
    },
    "keyboard-state": {
        "numlock": true,
        "capslock": true,
        "format": "{name} {icon}",
        "format-icons": {
            "locked": "’ĆŻ",
            "unlocked": "’é£"
        }
    },
    "sway/mode": {
        "format": "<span style=\"italic\">{}</span>"
    },
    "sway/scratchpad": {
        "format": "{icon} {count}",
        "show-empty": false,
        "format-icons": ["", "’ŗÆ"],
        "tooltip": true,
        "tooltip-format": "{app}: {title}"
    },
    "mpd": {
        "format": "{stateIcon} {consumeIcon}{randomIcon}{repeatIcon}{singleIcon}{artist} - {album} - {title} ({elapsedTime:%M:%S}/{totalTime:%M:%S}) ŌĖ©{songPosition}|{queueLength}ŌĖ® {volume}% ’Ćü",
        "format-disconnected": "Disconnected ’Ćü",
        "format-stopped": "{consumeIcon}{randomIcon}{repeatIcon}{singleIcon}Stopped ’Ćü",
        "unknown-tag": "N/A",
        "interval": 2,
        "consume-icons": {
            "on": "’āä "
        },
        "random-icons": {
            "off": "<span color=\"#f53c3c\">’ü┤</span> ",
            "on": "’ü┤ "
        },
        "repeat-icons": {
            "on": "’Ć× "
        },
        "single-icons": {
            "on": "’Ć×1 "
        },
        "state-icons": {
            "paused": "’üī",
            "playing": "’üŗ"
        },
        "tooltip-format": "MPD (connected)",
        "tooltip-format-disconnected": "MPD (disconnected)"
    },
    "idle_inhibitor": {
        "format": "{icon}",
        "format-icons": {
            "activated": "’ü«",
            "deactivated": "’ü░"
        }
    },
    "tray": {
        // "icon-size": 21,
        "spacing": 10
    },
    "clock": {
        "format": "{:%a %d.%m.%Y (%W) %H:%M}",
        "timezone": "Europe/Berlin",
        "tooltip-format": "<big>{:%Y %B}</big>\n<tt><small>{calendar}</small></tt>",
        "format-alt": "{:%Y-%m-%d}"
    },
    "cpu": {
        "format": "{usage}% ’ŗø",
        "tooltip": false
    },
    "memory": {
        "format": "{}% ’āē"
    },
    "temperature": {
        // "thermal-zone": 2,
        // "hwmon-path": "/sys/class/hwmon/hwmon2/temp1_input",
        "hwmon-path": "/sys/devices/pci0000:00/0000:00:18.3/hwmon/hwmon3/temp1_input",
        "critical-threshold": 80,
        // "format-critical": "{temperatureC}┬░C {icon}",
        "format": "{temperatureC}┬░C {icon}",
        "format-icons": ["’Ø½", "’ŗē", "’Ø®"]
    },
    "backlight": {
        // "device": "acpi_video1",
        "format": "{percent}% {icon}",
        "format-icons": ["ŅÄŹ", "ŅÅō", "ŅÅæ", "ŅÅÅ", "ŅÅÄ", "ŅÅŹ", "ŅÅŖ", "ŅÅł", "ŅÄø"]
    },
    "battery": {
        "states": {
            // "good": 95,
            "warning": 30,
            "critical": 15
        },
        "format": "{capacity}% {icon}",
        "format-charging": "{capacity}% ’Ś¦",
        "format-plugged": "{capacity}% ’ć”",
        "format-alt": "{time} {icon}",
        // "format-good": "", // An empty format will hide the module
        // "format-full": "",
        "format-icons": ["’ēä", "’ēā", "’ēé", "’ēü", "’ēĆ"]
    },
    "battery#bat2": {
        "bat": "BAT2"
    },
    "network": {
        // "interface": "wlp2*", // (Optional) To force the use of this interface
        "format-wifi": "{essid} ({signalStrength}%) ’ć½",
        "format-ethernet": "{ipaddr}/{cidr} ’×¢",
        "tooltip-format": "{ifname} via {gwaddr} ’×¢",
        "format-linked": "{ifname} (No IP) ’×¢",
        "format-disconnected": "Disconnected ŌÜĀ",
        "format-alt": "{ifname}: {ipaddr}/{cidr}"
    },
    "pulseaudio": {
        // "scroll-step": 1, // %, can be a float
        "format": "{volume}% {icon} {format_source}",
        "format-bluetooth": "{volume}% {icon}’Ŗö {format_source}",
        "format-bluetooth-muted": "’Ü® {icon}’Ŗö {format_source}",
        "format-muted": "’Ü® {format_source}",
        "format-source": "{volume}% ’ä░",
        "format-source-muted": "’ä▒",
        "format-icons": {
            "headphone": "’Ćź",
            "hands-free": "’¢É",
            "headset": "’¢É",
            "phone": "’éĢ",
            "portable": "’éĢ",
            "car": "’å╣",
            "default": ["’Ć”", "’Ć¦", "’Ć©"]
        },
        "on-click": "pavucontrol"
    },
    "custom/media": {
        "format": "{icon} {}",
        "return-type": "json",
        "max-length": 40,
        "format-icons": {
            "spotify": "’å╝",
            "default": "­¤Ä£"
        },
        "escape": true,
        "exec": "$HOME/.config/waybar/mediaplayer.py 2> /dev/null" // Script in resources folder
        // "exec": "$HOME/.config/waybar/mediaplayer.py --player spotify 2> /dev/null" // Filter player based on name
    },
    "user": {
        "format": "{user} (up {work_d} days Ōåæ)",
        "interval": 60,
        //"height": 30,
        //"width": 30,
        "icon": true,
    },
    "custom/checkupdates": {
        //"format": "<big>¶Åå▓</big>  {}",
        "format": "{} ’ĆĪ ",
        "interval": 3600,                           // every hour
        "exec": "paru -Qu | wc -l",       // # of updates
        //"exec": "checkupdates-with-aur | wc -l",       // # of updates
        //"exec": "pamac-checkupdates | wc -l",       // # of updates
        //"exec": "yay -Qu | wc -l",       // # of updates
        "exec-if": "exit 0",                        // always run; consider advanced run conditions
        //"on-click": "alacritty -e 'paru' -Suy --noconfirm --skipreview; pkill -SIGRTMIN+8 waybar; ~/.config/waybar/custom/kernel_check.sh", // update system
        //"on-click": "kitty 'paru' -Suy --noconfirm --skipreview; pkill -SIGRTMIN+8 waybar; ~/.config/waybar/custom/kernel_check.sh", // update system
        "on-click": "kitty 'paru' -Suy; pkill -SIGRTMIN+8 waybar; ~/.config/waybar/custom/kernel_check.sh", // update system
        "signal": 8,
        "max-length": 7,
        "min-length": 5
    },
    "custom/tmux": {
        "format": "{} ’äĀ",
        "interval": 300,                 // 5 minutes
        "exec": "tmux ls | wc -l",       // # of sesstions
        "exec-if": "exit 0",             // always run; consider advanced run conditions
        "on-click": "alacritty -e tmux", // new session
        "signal": 8,
        "max-length": 7,
        "min-length": 5
     },
    "custom/checkkernel":{
      "format": "{}",
      "interval": 1800,
      "exec": "~/.config/waybar/custom/kernel_check.sh"
    },
    "wireplumber": {
        "format": "{volume}% {icon}",
        "format-muted": "’Ć”",
        //"on-click": "helvum",
        "on-click": "pavucontrol",
        "format-icons": ["’Ć”", "’Ć¦", "’Ć©"]
    },
}
